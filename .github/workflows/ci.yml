name: CI Alikonweb extensions Playground

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DB_NAME: test_joomla
  DB_USER: joomla_ut
  DB_PASS: joomla_ut

jobs:
# -------------------------------------------------
# Composer (Run natively for speed/stability)
# -------------------------------------------------
  composer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, zip
      - uses: ./.github/actions/setup-dependencies

# -------------------------------------------------
# PHPCS
# -------------------------------------------------
  phpcs:
    runs-on: ubuntu-latest
    needs: composer
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - uses: ./.github/actions/setup-dependencies
      - name: Run PHP CS Fixer and PHPCS
        continue-on-error: true
        run: |
          ./vendor/bin/php-cs-fixer fix -vvv --dry-run --diff
          ./vendor/bin/phpcs --extensions=php -p --standard=ruleset.xml src/

# -------------------------------------------------
# PREPARE TESTS (Run natively to fix Artifact Download)
# -------------------------------------------------
  prepare_tests:
    runs-on: ubuntu-latest
    needs: phpcs
    strategy:
      matrix:
        joomla-version: ['5.4', '6.0', '6.1']
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      
      - uses: ./.github/actions/setup-dependencies
        with:
          npm-cache: 'true'

      - name: Determine Nightly URL
        id: joomla-info
        shell: bash
        run: |
          URL=$(curl -s "https://api.github.com/repos/joomla/joomla-cms/releases?per_page=50" \
            | jq -r --arg ver "${{ matrix.joomla-version }}" '.[] | .assets[] | select(.browser_download_url | contains($ver) and endswith("Full_Package.zip")) | .browser_download_url' \
            | head -1)
          if [ -z "$URL" ] || [ "$URL" = "null" ]; then exit 1; fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Download and Verify Joomla
        run: |
          curl -LfsS "${{ steps.joomla-info.outputs.url }}" -o joomla.zip
          unzip -t joomla.zip

      - name: Build
        run: vendor/bin/robo build

      - name: Upload artifacts (v4 works perfectly on native runners)
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-j${{ matrix.joomla-version }}
          path: |
            dist/
            joomla.zip
          retention-days: 1

# -------------------------------------------------
# SYSTEM TESTS — MYSQL (Kept in Container for Cypress environment)
# -------------------------------------------------
  system-tests-mysql:
    runs-on: ubuntu-latest
    needs: prepare_tests
    strategy:
      fail-fast: false
      matrix:
        joomla-version: ['5.4', '6.0', '6.1']
        php-version: ['8.2', '8.3']
    container:
      image: joomlaprojects/docker-images:cypress${{ matrix.php-version }}
      # WE REMOVED --network host HERE TO FIX THE CRASH
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_joomla
          MYSQL_USER: joomla_ut
          MYSQL_PASSWORD: joomla_ut
    steps:
      - uses: actions/checkout@v4
      
      # FIX: We manually lower MTU inside the container to prevent Artifact download failure
      - name: Network MTU Fix
        run: ip link set dev eth0 mtu 1400 || true

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-j${{ matrix.joomla-version }}
          path: .
          
      - uses: ./.github/actions/setup-dependencies
      - uses: ./.github/actions/setup-cypress
      
      - name: Run MySQL system tests
        run: |
          unzip -q joomla.zip -d joomla
          # npx cypress run ...
