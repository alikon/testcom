PLG_SYSTEM_MAGICLOGIN="System - Magic Login"
PLG_SYSTEM_MAGICLOGIN_XML_DESCRIPTION="<p>Allows users to login with magic links sent via email. When a login fails with an email address, a magic link is automatically sent.</p><div class='alert alert-success'>The Magic Login plugin  is free and Open Source software distributed under the <a href='https://www.gnu.org/licenses/old-licenses/gpl-2.0.en.html'> GNU General Public License version 2 or later</a>.</div><p><a href='https://www.alikonweb.it' target='_blank' class='btn btn-primary'><i class='fa fa-book fa-lg' aria-hidden='true'></i>&nbsp; Manual </a><a href='https://www.x.com/Alikon' target='_blank' class='btn btn-primary'><i class='fab fa-x-twitter fa-lg' aria-hidden='true'></i>&nbsp; Follow </a><a href='https://github.com/alikon/testcom/issues' target='_blank' class='btn btn-danger'><i class='fa fa-bug fa-lg' aria-hidden='true'></i>&nbsp; Report Issues </a><a href='https://github.com/sponsors/alikon' target='_blank' class='btn btn-success'><i class='fab fa-github-square fa-lg' aria-hidden='true'></i>&nbsp; Sponsor </a></p><div class='alert alert-info d-flex align-items-center' role='alert'><div>Version: 1.0.0</div></div><style>a[target='_blank']::before {content: '';}</style>"
PLG_SYSTEM_MAGICLOGIN_EMAIL_SENT="If this email address is registered, we've sent a magic login link to your inbox."
PLG_SYSTEM_MAGICLOGIN_EMAIL_SUBJECT="Login to {SITENAME}"
PLG_SYSTEM_MAGICLOGIN_EMAIL_BODY="Hi {USERNAME},\n\nClick the link below to login:\n{MAGIC_LINK}\n\nThis link expires in {EXPIRY_MINUTES} minutes.\n\nBest regards,\n{SITENAME}"
PLG_SYSTEM_MAGICLOGIN_INVALID_TOKEN="This magic link is invalid or has expired."
PLG_SYSTEM_MAGICLOGIN_LOGIN_SUCCESS="You have been successfully logged in."
PLG_SYSTEM_MAGICLOGIN_TOKEN_EXPIRY_LABEL="Token Expiry (minutes)"
PLG_SYSTEM_MAGICLOGIN_TOKEN_EXPIRY_DESC="How long magic links remain valid"
PLG_SYSTEM_MAGICLOGIN_EMAIL_HTMLBODY="<p>Hi {USERNAME},</p><p>Click the link below to login:</p><p><a href='{MAGIC_LINK}'>Login Now</a></p><p>This link expires in {EXPIRY_MINUTES} minutes.</p><p>Best regards,<br>{SITENAME}</p>"
