services:
  app:
    build:
      context: ../.devcontainer
      dockerfile: Dockerfile
    # We use 'command' to pass arguments to the default entrypoint
    # This runs your chmod, then starts the standard joomla/apache process
    command: >
      bash -c "chmod +x /usr/local/bin/setup.sh && apache2-foreground"
    volumes:
      - ..:/workspaces/testcom:cached
      - ../.devcontainer/xdebug.ini:/usr/local/etc/php/conf.d/99-xdebug.ini
      - ./setup.sh:/usr/local/bin/setup.sh
      - setup-cache:/var/cache/setup-downloads    # ← aggiunto
    ports:
      - "8080:80"
      - "443:443"
    #  - "9003:9003"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy
      mailpit:
        condition: service_started

  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: test_joomla
      MYSQL_USER: joomla_ut
      MYSQL_PASSWORD: joomla_ut
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"
  phpmyadmin:
    image: phpmyadmin:latest
    profiles:
      - tools                          # avviato SOLO con --profile tools
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8081:80"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
  setup-cache:                                    # ← aggiunto
